services:
  - type: web
    name: veventa-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack pnpm install && corepack pnpm run build
    startCommand: corepack pnpm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
